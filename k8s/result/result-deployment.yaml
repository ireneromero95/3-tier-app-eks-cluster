apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: ireneromero95/result:latest
          ports:
            - containerPort: 80
          env:
            - name: PG_HOST
              value: "db"
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: PG_DATABASE
              value: "postgres" 
            - name: PORT
              value: "80"
            - name: PG_PORT
              value: "5432"