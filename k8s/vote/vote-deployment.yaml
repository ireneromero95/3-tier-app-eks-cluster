apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: ireneromero95/vote:latest
          ports:
            - containerPort: 5000