name: Voting App CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs: 
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Vote image
      uses: docker/build-push-action@v3
      with:
        context: ./images/vote
        file: ./images/vote/Dockerfile
        push: true
        tags: ireneromero95/vote:latest

    - name: Build and push Worker image
      uses: docker/build-push-action@v3
      with:
        context: ./images/worker
        file: ./images/worker/Dockerfile
        push: true
        tags: ireneromero95/worker:latest

    - name: Build and push Result image
      uses: docker/build-push-action@v3
      with:
        context: ./images/result
        file: ./images/result/Dockerfile
        push: true
        tags: ireneromero95/result:latest
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
    
    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name eks-cluster-irene-and-joao

    - name: Deploy to EKS
      run: |
        kubectl set image deployment/vote-deployment vote=ireneromero95/vote:latest
        kubectl set image deployment/worker-deployment worker=ireneromero95/worker
        kubectl set image deployment/result-deployment result=ireneromero95/result:latest
        kubectl rollout status deployment/vote-deployment
        kubectl rollout status deployment/worker-deployment
        kubectl rollout status deployment/result-deployment
